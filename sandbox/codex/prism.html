<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PRISM / Composition Machine</title><style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap');:root{--paper:#f0ead6;--black:#10100f;--red:#e43b2f;--blue:#1959a7;--yellow:#f5c928}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--black);font-family:"Space Mono"}button,input{font:inherit}.app{min-height:100vh;border:10px solid}.bar{height:64px;border-bottom:5px solid;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:10px;font-weight:bold}.bar a{color:inherit}.workspace{display:grid;grid-template-columns:180px 1fr 280px;min-height:720px}.tools{border-right:5px solid;padding:15px}.tools h2,.inspector h2{font:18px "Archivo Black"}.tool{width:100%;aspect-ratio:1;border:4px solid;background:var(--paper);margin-bottom:10px;font:11px "Space Mono";cursor:pointer}.tool.active{background:var(--yellow);box-shadow:5px 5px}.swatches{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.swatch{aspect-ratio:1;border:4px solid}.canvas-wrap{padding:30px;background:#d6d0bf;display:grid;place-items:center;overflow:hidden}.canvas{width:min(780px,100%);aspect-ratio:4/3;background:var(--paper);border:5px solid;position:relative;box-shadow:14px 14px}.object{position:absolute;border:5px solid;cursor:move;touch-action:none}.object.circle{width:35%;aspect-ratio:1;border-radius:50%;background:var(--blue);right:8%;top:8%}.object.square{width:27%;aspect-ratio:1;background:var(--yellow);left:12%;bottom:8%;transform:rotate(15deg)}.object.bar{width:65%;height:12%;background:var(--red);right:-8%;bottom:24%;transform:rotate(-18deg)}.poster-type{position:absolute;left:6%;top:8%;font:clamp(45px,8vw,105px)/.74 "Archivo Black";letter-spacing:-.09em;z-index:3;pointer-events:none}.poster-type span{display:block;color:var(--paper);-webkit-text-stroke:4px var(--black);text-shadow:7px 7px var(--red)}.inspector{border-left:5px solid;padding:18px}.group{border-top:4px solid;padding:14px 0}.group label{display:block;font-size:9px;font-weight:bold;margin:10px 0}.group input,.group select{width:100%;border:4px solid;background:white;padding:8px}.group input[type=range]{padding:0;accent-color:var(--red)}.group button{border:4px solid;background:white;padding:9px;width:100%;font-weight:bold;box-shadow:4px 4px;margin:5px 0}.group .danger{background:var(--red);color:white}.gallery{border-top:10px solid;padding:70px 5vw}.gallery h1{font:clamp(58px,10vw,130px)/.78 "Archivo Black";letter-spacing:-.08em}.sheet-row{display:grid;grid-template-columns:repeat(3,1fr);border-left:5px solid;border-top:5px solid}.sheet{border-right:5px solid;border-bottom:5px solid;padding:20px;min-height:260px}.sheet:nth-child(2){background:var(--red)}.sheet:nth-child(3){background:var(--blue);color:white}.mini{height:130px;border:4px solid;background:var(--paper);position:relative}.mini:before{content:"";position:absolute;width:70px;height:70px;border-radius:50%;background:var(--yellow);left:15px;top:15px;border:4px solid}.sheet b{font:24px "Archivo Black";display:block;margin-top:15px}.history{margin-top:35px;display:grid;grid-template-columns:repeat(4,1fr);border:5px solid}.history div{padding:18px;border-right:5px solid}.history div:last-child{border:0}.history small{display:block}.history b{font:30px "Archivo Black"}@media(max-width:850px){.workspace{grid-template-columns:90px 1fr}.inspector{grid-column:1/-1;border-left:0;border-top:5px solid}.sheet-row{grid-template-columns:1fr}.history{grid-template-columns:1fr 1fr}.poster-type{font-size:55px}.tools h2{font-size:11px}}
</style></head><body><main class="app"><header class="bar"><b>PRISM / COMPOSITION MACHINE</b><span>DOCUMENT 04 · 800 × 600</span><a href="index.html">ATLAS ↗</a></header><section class="workspace"><aside class="tools"><h2>OBJECTS</h2><button class="tool active" data-add="circle">●<br>CIRCLE</button><button class="tool" data-add="square">■<br>SQUARE</button><button class="tool" data-add="bar">━<br>BAR</button><h2>COLOR</h2><div class="swatches"><button class="swatch" style="background:var(--red)" data-color="#e43b2f"></button><button class="swatch" style="background:var(--blue)" data-color="#1959a7"></button><button class="swatch" style="background:var(--yellow)" data-color="#f5c928"></button><button class="swatch" style="background:var(--black)" data-color="#10100f"></button></div></aside><div class="canvas-wrap"><div class="canvas" id="canvas"><div class="poster-type" contenteditable="true">FORM<span>FOLLOWS</span>FEELING</div><i class="object circle selected"></i><i class="object square"></i><i class="object bar"></i></div></div><aside class="inspector"><h2>INSPECTOR</h2><div class="group"><label>SELECTED OBJECT<input id="selectedName" value="CIRCLE" readonly></label><label>SIZE / <output id="sizeOut">100</output>%<input id="size" type="range" min="40" max="150" value="100"></label><label>ROTATION / <output id="rotationOut">0</output>°<input id="rotation" type="range" min="-180" max="180" value="0"></label></div><div class="group"><button id="front">BRING TO FRONT</button><button id="duplicate">DUPLICATE OBJECT</button><button class="danger" id="remove">REMOVE</button></div><div class="group"><label>GRID<input type="checkbox" checked> SNAP / 20 PX</label><button id="export">EXPORT COMPOSITION</button></div></aside></section><section class="gallery"><span>ARCHIVE / WORKS IN PROGRESS</span><h1>ONE SYSTEM. ENDLESS FORM.</h1><div class="sheet-row"><article class="sheet"><div class="mini"></div><b>Circle Study №4</b><small>3 objects / primary</small></article><article class="sheet"><div class="mini"></div><b>Red Tension</b><small>8 objects / diagonal</small></article><article class="sheet"><div class="mini"></div><b>Blue Interval</b><small>5 objects / modular</small></article></div><div class="history"><div><small>OBJECTS</small><b id="count">03</b></div><div><small>COLORS</small><b>04</b></div><div><small>GRID</small><b>20</b></div><div><small>VERSION</small><b>12</b></div></div></section></main><script>
let selected=document.querySelector(".selected"),z=4;const objects=()=>document.querySelectorAll(".object");function choose(o){objects().forEach(x=>x.classList.remove("selected"));selected=o;o.classList.add("selected");document.querySelector("#selectedName").value=[...o.classList].find(x=>["circle","square","bar"].includes(x))||"OBJECT"}objects().forEach(o=>o.onclick=e=>{e.stopPropagation();choose(o)});document.querySelectorAll("[data-color]").forEach(b=>b.onclick=()=>selected.style.background=b.dataset.color);document.querySelector("#size").oninput=e=>{document.querySelector("#sizeOut").value=e.target.value;selected.style.scale=e.target.value/100};document.querySelector("#rotation").oninput=e=>{document.querySelector("#rotationOut").value=e.target.value;selected.style.rotate=e.target.value+"deg"};document.querySelector("#front").onclick=()=>selected.style.zIndex=++z;document.querySelector("#duplicate").onclick=()=>{const n=selected.cloneNode();n.style.translate="25px 25px";n.onclick=e=>{e.stopPropagation();choose(n)};document.querySelector("#canvas").append(n);document.querySelector("#count").textContent=String(objects().length).padStart(2,"0");choose(n)};document.querySelector("#remove").onclick=()=>{if(objects().length>1){selected.remove();choose(objects()[0]);document.querySelector("#count").textContent=String(objects().length).padStart(2,"0")}};document.querySelector("#export").onclick=()=>document.querySelector("#export").textContent="EXPORTED ✓";
</script></body></html>
