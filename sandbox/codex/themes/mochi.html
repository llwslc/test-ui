<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MOCHI — 软陶泡芙</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#fff3dd;color:#4a352d}body{font-family:"Avenir Next","Trebuchet MS",sans-serif;background-image:radial-gradient(circle at 10% 20%,#ed9db1 0 2px,transparent 2.5px),radial-gradient(circle at 70% 65%,#7bc9e5 0 2px,transparent 2.5px),radial-gradient(circle at 35% 80%,#edc94e 0 2px,transparent 2.5px);background-size:83px 91px,97px 74px,113px 88px}button,input,select{font:inherit;color:inherit}.app{min-height:100vh;padding:18px}.tray{min-height:calc(100vh - 36px);border-radius:48px;background:#f8e8c9;box-shadow:inset 16px 18px 30px #a576501f,inset -12px -12px 25px #fff,0 25px 50px #8b654628;overflow:hidden}.top{display:flex;justify-content:space-between;align-items:center;padding:18px 28px}.brand{display:flex;gap:11px;align-items:center;font-family:"Arial Rounded MT Bold",sans-serif;font-size:21px}.brand i{display:grid;place-items:center;width:42px;height:42px;border-radius:14px 18px 13px 20px;background:#f0ca4d;box-shadow:inset 5px 6px 8px #fff8,5px 6px 9px #835d4625;font-style:normal}.nav{display:flex;gap:8px}.nav a{padding:9px 13px;border-radius:999px;color:#70554a;text-decoration:none}.nav a.active{background:#fff5e2;box-shadow:inset 3px 4px 7px #a46e4a1b}.cart{padding:9px 14px;border:0;border-radius:999px;background:#ed9db1;box-shadow:inset 4px 5px 7px #fff8,0 5px 0 #ce7b92;font-weight:bold}.hero{display:grid;grid-template-columns:1fr 1fr;gap:4vw;align-items:center;padding:25px 7vw 40px}.copy .kicker{color:#cf6d89;font-size:10px;font-weight:900;letter-spacing:.18em}.copy h1{margin:12px 0;font-family:"Arial Rounded MT Bold",sans-serif;font-size:clamp(58px,8.5vw,122px);line-height:.82;letter-spacing:-.07em;text-shadow:0 8px #ed9db133}.copy p{max-width:460px;color:#7b6257;line-height:1.65}.squish{padding:13px 22px;border:0;border-radius:999px;background:#ed9db1;box-shadow:inset 6px 7px 10px #fff8,0 8px 0 #cf7d94,0 14px 20px #8560482b;font-weight:900;cursor:pointer}.squish:active{transform:translateY(6px) scale(.97);box-shadow:inset 5px 6px 10px #a95d742d,0 2px 0 #cf7d94}.dessert{position:relative;min-height:360px}.mochi{position:absolute;border-radius:48% 52% 46% 54%/58% 57% 43% 42%;box-shadow:inset 15px 17px 22px #fff9,inset -16px -18px 25px #8c53632a,0 22px 25px #76553d2c}.m1{top:50%;left:50%;width:230px;height:210px;background:#efa4b7;transform:translate(-50%,-50%);animation:squishy 3s ease-in-out infinite}.m1:before,.m1:after{position:absolute;top:42%;width:13px;height:13px;border-radius:50%;background:#4a352d;content:""}.m1:before{left:32%}.m1:after{right:32%}.mouth{position:absolute;z-index:2;top:57%;left:47%;width:16px;height:8px;border-bottom:3px solid #4a352d;border-radius:50%}.m2{top:8%;right:5%;width:105px;height:100px;background:#7bc9e5}.m3{left:4%;bottom:3%;width:78px;height:74px;background:#f0ca4d}@keyframes squishy{50%{border-radius:54% 46% 51% 49%/48% 46% 54% 52%;transform:translate(-50%,-47%) scaleX(1.05) scaleY(.96)}}.sprinkles{position:absolute;inset:0;background:linear-gradient(25deg,transparent 49%,#fff 50% 52%,transparent 53%) 20px 40px/55px 55px;opacity:.55}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:0 4vw 35px}.card{padding:19px;border-radius:32px 38px 29px 42px;background:#fff6e6;box-shadow:12px 14px 26px #9a704d20,-7px -7px 18px #fff,inset 0 1px #fff}.card h2{margin:0 0 16px;font-family:"Arial Rounded MT Bold",sans-serif;font-size:16px}.flavors{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.flavor{aspect-ratio:1;border:0;border-radius:45% 55% 48% 52%;background:#ed9db1;box-shadow:inset 5px 6px 7px #fff8,3px 5px 8px #865e4825;cursor:pointer}.flavor:nth-child(2){background:#7bc9e5}.flavor:nth-child(3){background:#f0ca4d}.flavor:nth-child(4){background:#b99cd9}.flavor.active{outline:4px solid #4a352d;outline-offset:2px}.field{margin:13px 0}.field label{display:block;margin-bottom:6px;color:#80665a;font-size:10px}.field input,.field select{width:100%;padding:11px 14px;border:0;border-radius:999px;background:#f3dfbc;box-shadow:inset 4px 5px 8px #8b65462c;outline:none}.toggle{display:flex;justify-content:space-between;align-items:center;padding:10px 0}.toggle button{position:relative;width:50px;height:25px;border:0;border-radius:999px;background:#cebda1;box-shadow:inset 3px 4px 7px #76533c2a;cursor:pointer}.toggle button:after{position:absolute;top:3px;left:4px;width:19px;height:19px;border-radius:50%;background:#fff4df;box-shadow:2px 2px 4px #76533c33;content:"";transition:.2s}.toggle button[aria-pressed=true]{background:#7bc9e5}.toggle button[aria-pressed=true]:after{left:27px}.order{display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;padding:9px 0;border-bottom:2px dotted #a68574}.order i{display:grid;place-items:center;width:42px;height:42px;border-radius:15px;background:#ed9db1;font-style:normal}.order small{display:block;color:#8a6c60}.order b:last-child{color:#cf6d89}.toast{position:fixed;right:25px;bottom:25px;padding:13px 19px;border-radius:999px;background:#4a352d;color:#fff3dd;opacity:0;transform:scale(.7);transition:.25s}.toast.show{opacity:1;transform:scale(1)}
@media(max-width:800px){.nav{display:none}.hero{grid-template-columns:1fr;padding:30px 25px}.board{grid-template-columns:1fr;padding:0 18px 28px}.copy h1{font-size:69px}}
</style></head><body><main class="app"><section class="tray"><header class="top"><div class="brand"><i>●</i>MOCHI STUDIO</div><nav class="nav"><a class="active" href="#">Make</a><a href="#">Flavors</a><a href="#">Friends</a></nav><button class="cart">BOX · 03</button></header><section class="hero"><div class="copy"><div class="kicker">FRESHLY MADE · EXTRA SOFT · 10</div><h1>Soft enough to squish</h1><p>胖墩药丸按钮、指压凹窝、糖霜边和真正会“瘪下去”的交互。整个界面像一盒刚出炉的软陶泡芙。</p><button class="squish toast-btn">GIVE IT A SQUEEZE　♡</button></div><div class="dessert"><div class="sprinkles"></div><i class="mochi m1"></i><i class="mouth"></i><i class="mochi m2"></i><i class="mochi m3"></i></div></section><section class="board"><article class="card"><h2>① Pick a flavor</h2><div class="flavors"><button class="flavor active" aria-label="草莓"></button><button class="flavor" aria-label="汽水"></button><button class="flavor" aria-label="香草"></button><button class="flavor" aria-label="芋泥"></button></div><div class="field"><label>给它起个名字</label><input value="Puff № 10"></div><div class="field"><label>糖霜</label><select><option>云朵奶油</option><option>草莓滴边</option><option>可可粉</option></select></div></article><article class="card"><h2>② Make it yours</h2><div class="toggle"><span>糖针撒点</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>咬缺一角</span><button data-toggle aria-pressed="false"></button></div><div class="toggle"><span>蒸汽袅袅</span><button data-toggle aria-pressed="true"></button></div><label style="font-size:10px">SQUISH · <output id="sq">82</output>%</label><input type="range" value="82" style="width:100%;accent-color:#ed9db1" oninput="sq.value=this.value"></article><article class="card"><h2>③ Your little box</h2><div class="order"><i>●</i><span><b>Berry Puff</b><small>soft / pink</small></span><b>×2</b></div><div class="order"><i style="background:#7bc9e5">●</i><span><b>Soda Puff</b><small>jelly / blue</small></span><b>×1</b></div><button class="squish toast-btn" style="width:100%;margin-top:16px">PACK MY BOX</button></article></section></section></main><div class="toast">Puff! 已装进软乎乎的小盒子</div><script>document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".flavor").forEach(b=>b.onclick=()=>{document.querySelectorAll(".flavor").forEach(x=>x.classList.remove("active"));b.classList.add("active")});document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{let t=document.querySelector(".toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)})</script></body></html>
