<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ORMOLU — 洛可可宫廷</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#f4eedf;color:#4d4034}body{font-family:Baskerville,"Times New Roman",serif;background:radial-gradient(ellipse at 20% 0,#fffaf0,transparent 32%),radial-gradient(ellipse at 90% 30%,#d7a6ac55,transparent 28%),#f4eedf}button,input,select{font:inherit;color:inherit}.court{min-height:100vh;padding:18px}.frame{min-height:calc(100vh - 36px);border:1px solid #a98645;outline:5px double #b7924f;outline-offset:-11px;background:#ffffff38}.mast{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:22px 32px;border-bottom:1px solid #c3a669}.mast nav{display:flex;gap:24px}.mast a{color:#75695c;font-size:11px;text-decoration:none}.mast a:hover{color:#a27b34}.monogram{position:relative;display:grid;place-items:center;width:74px;height:74px;border:4px double #b28c47;border-radius:50%;background:#e7ede2;color:#a27b34;font-size:35px;font-style:italic;box-shadow:0 8px 25px #7d60372a}.monogram:before,.monogram:after{position:absolute;width:60px;height:1px;background:#b28c47;content:""}.monogram:before{right:70px}.monogram:after{left:70px}.mast .right{justify-self:end}.hero{display:grid;grid-template-columns:.9fr 1.1fr;gap:4vw;align-items:center;min-height:440px;padding:44px 7vw}.copy{text-align:center}.eyebrow{color:#9b7c45;font-size:10px;letter-spacing:.22em}.copy h1{margin:12px 0 4px;font-family:Didot,"Bodoni 72",serif;font-size:clamp(60px,8vw,118px);font-weight:400;font-style:italic;line-height:.86;color:#74634d}.copy h2{margin:16px 0;font-size:20px;font-weight:400;letter-spacing:.08em}.copy p{max-width:480px;margin:0 auto;color:#756d64;line-height:1.7}.ribbon{display:inline-flex;align-items:center;gap:20px;margin-top:25px;padding:12px 25px;border:1px solid #a98645;border-radius:999px;background:linear-gradient(#fff9ec,#e8d5ba);box-shadow:inset 0 1px white,0 8px 18px #6a52301c;cursor:pointer}.ribbon:hover{background:#a98645;color:white}
.portrait{position:relative;display:grid;place-items:center;min-height:350px}.cartouche{position:relative;width:min(32vw,330px);height:350px;border:9px double #b28c47;border-radius:48% 48% 34% 34% / 38% 38% 22% 22%;background:radial-gradient(circle at 50% 30%,#f6d8dc,#9caa92 75%);box-shadow:inset 0 0 0 10px #fff8e7aa,0 30px 50px #6e57352f}.cartouche:before,.cartouche:after{position:absolute;top:32%;width:90px;height:140px;border:7px double #b28c47;border-radius:50%;content:""}.cartouche:before{left:-76px;transform:rotate(-25deg)}.cartouche:after{right:-76px;transform:rotate(25deg)}.cameo{position:absolute;inset:46px 60px;border-radius:50% 50% 42% 42%;background:linear-gradient(145deg,#fff8e8 0 45%,#d99da8 46%);box-shadow:inset 0 0 20px #80643840}.cameo:after{position:absolute;right:25%;bottom:18%;width:47%;height:58%;border-radius:55% 50% 45% 45%;background:#5d6953;content:"";filter:drop-shadow(7px 5px #a77e3d55)}.portrait-label{position:absolute;bottom:8px;padding:8px 25px;border:1px solid #a98645;border-radius:50%;background:#f8efdc;font-size:11px;font-style:italic}
.suite{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;padding:0 4vw 42px}.card{position:relative;padding:28px;border:3px double #b69a67;background:#fff9edaa;box-shadow:0 15px 30px #73562d18}.card:before,.card:after{position:absolute;width:20px;height:20px;border-color:#a98645;content:""}.card:before{top:7px;left:7px;border-top:1px solid;border-left:1px solid}.card:after{right:7px;bottom:7px;border-right:1px solid;border-bottom:1px solid}.card h3{margin:0 0 20px;text-align:center;font-family:Didot,serif;font-size:20px;font-weight:400}.field{margin:14px 0}.field label{display:block;margin-bottom:6px;color:#877967;font-size:11px}.field input,.field select{width:100%;padding:11px 14px;border:1px solid #b69a67;border-radius:999px;background:#f9f3e8;outline:none}.field input:focus{box-shadow:0 0 0 3px #d6a8ae55}.segmented{display:flex;padding:4px;border:1px solid #b69a67;border-radius:999px}.segmented button{flex:1;padding:8px;border:0;border-radius:999px;background:transparent;cursor:pointer}.segmented button.active{background:#99a88f;color:white}.toggle{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #cbb78d}.toggle button{width:49px;height:24px;border:1px solid #a98645;border-radius:50%;background:#e7d7be;cursor:pointer}.toggle button[aria-pressed=true]{background:#99a88f;box-shadow:inset 25px 0 #fff}.toggle button[aria-pressed=false]{box-shadow:inset -25px 0 #fff}.meter{display:flex;align-items:center;gap:12px;margin:15px 0}.meter span{width:65px;font-size:11px}.meter div{flex:1;height:9px;border:1px solid #a98645;border-radius:10px;padding:2px}.meter i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,#9eab91,#d29ca6)}.actions{display:flex;gap:9px;margin-top:21px}.actions button{flex:1;padding:10px;border:1px solid #a98645;border-radius:999px;background:#f9f0dd;cursor:pointer}.actions .gold{color:white;background:linear-gradient(#c6a662,#987235)}.toast{position:fixed;right:30px;bottom:30px;padding:14px 24px;border:3px double #a98645;border-radius:999px;background:#fff8e9;opacity:0;transition:.3s}.toast.show{opacity:1}

</style></head><body><div class="court"><div class="frame"><header class="mast"><nav><a href="#">Le Salon</a><a href="#">Collections</a><a href="#">Atelier</a></nav><div class="monogram">O</div><nav class="right"><a href="#">Journal</a><a href="#">Invitations</a></nav></header><section class="hero"><div class="copy"><div class="eyebrow">MAISON D’INTERFACES · PARIS MMXXVI</div><h1>Ormolu</h1><h2>La belle interface</h2><p>一套为优雅仪式而生的宫廷控件。鼠尾草丝绸、胭脂花瓣与旧金卷草，让每一次操作都有从容的开场。</p><button class="ribbon toast-btn">揭开今日帷幕 <span>✦</span></button></div><div class="portrait"><div class="cartouche"><div class="cameo"></div></div><span class="portrait-label">Portrait de l’Interface, № 07</span></div></section><section class="suite"><article class="card"><h3>Votre invitation</h3><div class="field"><label>宾客称谓</label><input value="Madame Élodie" aria-label="宾客称谓"></div><div class="field"><label>厅室</label><select><option>绿丝厅 · Salon de Sauge</option><option>镜廊 · Galerie des Glaces</option></select></div><div class="segmented"><button class="active">晨宴</button><button>午茶</button><button>夜舞</button></div></article><article class="card"><h3>Préférences</h3><div class="toggle"><span>金箔高光</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>丝绸动效</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>花体首字</span><button data-toggle aria-pressed="false"></button></div><div class="actions"><button>恢复</button><button class="gold toast-btn">保存偏好</button></div></article><article class="card"><h3>Étiquette</h3><div class="meter"><span>华丽度</span><div><i style="width:88%"></i></div><b>88</b></div><div class="meter"><span>留白</span><div><i style="width:54%"></i></div><b>54</b></div><div class="meter"><span>礼仪感</span><div><i style="width:96%"></i></div><b>96</b></div><div class="field"><label>卷草密度</label><input type="range" min="0" max="100" value="72" style="accent-color:#a98645"></div></article></section></div></div><div class="toast">Votre choix est enregistré ✦</div><script>document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".segmented button").forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active")});document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{let t=document.querySelector(".toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)})</script></body></html>
