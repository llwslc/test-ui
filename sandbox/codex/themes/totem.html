<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TOTEM — 民艺图腾</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#d8c298;color:#213347}body{font-family:Futura,"Avenir Next",sans-serif;background-image:repeating-linear-gradient(0deg,transparent 0 5px,#593d2810 6px),repeating-linear-gradient(90deg,transparent 0 7px,#593d2810 8px)}button,input,select{font:inherit;color:inherit}.woven{height:18px;background:repeating-linear-gradient(45deg,#253e61 0 14px,#eee2c9 14px 28px,#a54c2b 28px 42px,#d0a52c 42px 56px)}.app{min-height:calc(100vh - 36px);border-right:18px solid #253e61;border-left:18px solid #253e61}.top{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;border-bottom:5px solid #253e61}.mark{display:flex;align-items:center;gap:12px}.mark b{display:grid;place-items:center;width:42px;height:42px;border:4px solid #213347;background:conic-gradient(#a54c2b 0 25%,#eee2c9 0 50%,#d0a52c 0 75%,#253e61 0);color:#213347}.mark span{font-family:Rockwell,serif;font-size:22px;font-weight:900;letter-spacing:.15em}.top nav{display:flex;gap:22px}.top a{color:#435066;font-size:10px;font-weight:800;letter-spacing:.1em;text-decoration:none}.hero{display:grid;grid-template-columns:1fr 1fr;gap:5vw;align-items:center;padding:42px 7vw}.hero .kicker{font-size:10px;font-weight:900;letter-spacing:.2em}.hero h1{margin:12px 0;font-family:Rockwell,"Roboto Slab",serif;font-size:clamp(58px,8vw,116px);font-weight:900;line-height:.8;text-transform:uppercase;text-shadow:6px 6px #eee2c9,10px 10px #a54c2b}.hero p{max-width:480px;line-height:1.7}.carved{padding:13px 22px;border:5px solid #213347;background:#a54c2b;color:#eee2c9;font-weight:900;letter-spacing:.08em;box-shadow:7px 7px 0 #253e61;cursor:pointer}.carved:hover{background:#253e61}.totem-art{position:relative;display:flex;justify-content:center;align-items:center;min-height:360px}.pillar{position:relative;width:160px;height:330px;border:8px solid #213347;background:linear-gradient(#253e61 0 18%,#eee2c9 18% 23%,#a54c2b 23% 47%,#d0a52c 47% 52%,#253e61 52% 73%,#eee2c9 73%);box-shadow:18px 18px #2133472c}.pillar:before{position:absolute;top:30px;left:30px;width:30px;height:30px;border:7px solid #eee2c9;border-radius:50%;box-shadow:55px 0 0 -7px #a54c2b,55px 0 0 0 #eee2c9;content:""}.pillar:after{position:absolute;right:25px;bottom:28px;left:25px;height:50px;background:repeating-linear-gradient(45deg,#a54c2b 0 15px,#eee2c9 15px 30px);content:""}.wing{position:absolute;width:100px;height:170px;border:7px solid #213347;background:repeating-linear-gradient(0deg,#a54c2b 0 25px,#d0a52c 25px 50px,#eee2c9 50px 75px);clip-path:polygon(0 0,100% 20%,70% 100%,0 80%)}.w1{left:calc(50% - 175px);transform:rotate(-7deg)}.w2{right:calc(50% - 175px);transform:scaleX(-1) rotate(-7deg)}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;padding:0 4vw 40px}.panel{min-height:260px;border:5px solid #213347;background:#e7d5b2;box-shadow:7px 8px #21334722}.panel h2{margin:0;padding:10px 15px;background:#253e61;color:#eee2c9;font-family:Rockwell,serif;font-size:15px;letter-spacing:.1em}.inside{padding:18px}.pattern-options{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.pattern{aspect-ratio:1;border:4px solid #213347;background:conic-gradient(#a54c2b 0 25%,#eee2c9 0 50%,#d0a52c 0 75%,#253e61 0);cursor:pointer}.pattern:nth-child(2){background:repeating-linear-gradient(45deg,#253e61 0 8px,#eee2c9 8px 16px)}.pattern:nth-child(3){background:radial-gradient(circle,#a54c2b 0 28%,#d0a52c 29% 45%,#253e61 46%)}.pattern:nth-child(4){background:linear-gradient(135deg,#a54c2b 50%,#253e61 51%)}.pattern.active{outline:4px solid #a54c2b;outline-offset:2px}.field{margin:14px 0}.field label{display:block;margin-bottom:5px;font-size:10px;font-weight:900}.field input,.field select{width:100%;padding:10px;border:3px solid #213347;background:#eee2c9}.stepper{display:grid;grid-template-columns:40px 1fr 40px;border:3px solid #213347}.stepper button{border:0;background:#a54c2b;color:#eee2c9;font-weight:900;cursor:pointer}.stepper output{padding:8px;text-align:center;font-weight:900}.toggle{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:3px solid #213347}.toggle button{width:50px;height:24px;border:3px solid #213347;background:#eee2c9;cursor:pointer}.toggle button:after{display:block;width:15px;height:15px;background:#253e61;content:"";transform:translate(1px,1px);transition:.2s}.toggle button[aria-pressed=true]:after{background:#a54c2b;transform:translate(26px,1px) rotate(45deg)}.rhythm{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;align-items:end;height:90px}.rhythm i{display:block;background:#253e61}.rhythm i:nth-child(3n){background:#a54c2b}.legend{display:flex;justify-content:space-between;margin-top:12px;font-size:9px}.toast{position:fixed;right:25px;bottom:25px;padding:13px 18px;border:5px solid #213347;background:#d0a52c;font-weight:900;opacity:0;transform:translateY(20px);transition:.25s}.toast.show{opacity:1;transform:none}
@media(max-width:800px){.top nav{display:none}.hero{grid-template-columns:1fr}.controls{grid-template-columns:1fr;padding:0 20px 30px}.hero h1{font-size:64px}}
</style></head><body><div class="woven"></div><main class="app"><header class="top"><div class="mark"><b>◆</b><span>TOTEM</span></div><nav><a href="#">MAKERS</a><a href="#">PATTERNS</a><a href="#">STORIES</a><a href="#">ARCHIVE</a></nav></header><section class="hero"><div><div class="kicker">HAND / EARTH / RHYTHM · 05</div><h1>Made in pattern</h1><p>边饰像织物一样展开，控件带着木刻的粗粝边缘。重复不是复制，而是手工留下的节奏与偏差。</p><button class="carved toast-btn">加入制作圆环　◆</button></div><div class="totem-art"><i class="wing w1"></i><div class="pillar"></div><i class="wing w2"></i></div></section><section class="controls"><article class="panel"><h2>01 · CHOOSE A MOTIF</h2><div class="inside"><div class="pattern-options"><button class="pattern active" aria-label="四象纹"></button><button class="pattern" aria-label="编织纹"></button><button class="pattern" aria-label="日轮纹"></button><button class="pattern" aria-label="山形纹"></button></div><div class="field"><label>作品名称</label><input value="Four Winds / 四方风"></div><div class="field"><label>基底材料</label><select><option>赭石木板</option><option>靛蓝织布</option><option>骨白陶片</option></select></div></div></article><article class="panel"><h2>02 · SET THE RHYTHM</h2><div class="inside"><div class="field"><label>重复单元</label><div class="stepper"><button onclick="step(-1)">−</button><output id="count">12</output><button onclick="step(1)">＋</button></div></div><div class="toggle"><span>镜像对称</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>保留刀痕</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>边饰连续</span><button data-toggle aria-pressed="false"></button></div></div></article><article class="panel"><h2>03 · RHYTHM MAP</h2><div class="inside"><div class="rhythm"><i style="height:35%"></i><i style="height:60%"></i><i style="height:90%"></i><i style="height:50%"></i><i style="height:75%"></i><i style="height:42%"></i><i style="height:88%"></i><i style="height:58%"></i></div><div class="legend"><span>赭石 / EARTH</span><span>靛蓝 / NIGHT</span></div><button class="carved toast-btn" style="width:100%;margin-top:22px">刻下图样</button></div></article></section></main><div class="woven"></div><div class="toast">图样已收入工坊</div><script>let n=12;function step(x){n=Math.max(1,Math.min(24,n+x));count.value=n}document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".pattern").forEach(b=>b.onclick=()=>{document.querySelectorAll(".pattern").forEach(x=>x.classList.remove("active"));b.classList.add("active")});document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{let t=document.querySelector(".toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)})</script></body></html>
