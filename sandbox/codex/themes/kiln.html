<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KILN — 陶土侘寂</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#e3dac8;color:#292722}body{font-family:"Avenir Next","Segoe UI",sans-serif;background-image:radial-gradient(circle,#594a3812 0 1px,transparent 1.3px),linear-gradient(110deg,transparent 42%,#fff3 50%,transparent 57%);background-size:7px 7px,340px 100%}button,input,select{font:inherit;color:inherit}.app{display:grid;grid-template-columns:1fr 68px;min-height:100vh}.side{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:22px 0;border-left:1px solid #39352e44}.side b{font-family:Georgia,serif;font-size:24px;font-weight:400;writing-mode:vertical-rl}.side nav{display:flex;gap:25px;writing-mode:vertical-rl}.side a{color:#746e64;font-size:10px;letter-spacing:.2em;text-decoration:none}.side a.active{color:#ba6745}.side small{font:8px ui-monospace,monospace;writing-mode:vertical-rl}.content{padding:25px clamp(24px,5vw,72px) 45px}.top{display:flex;justify-content:space-between;align-items:center;padding-bottom:18px;border-bottom:1px solid #29272233}.top span{font:9px ui-monospace,monospace;letter-spacing:.16em}.top nav{display:flex;gap:22px}.top a{color:#746e64;font-size:11px;text-decoration:none}.hero{display:grid;grid-template-columns:.9fr 1.1fr;gap:6vw;align-items:center;min-height:450px}.copy .kicker{color:#ba6745;font:9px ui-monospace,monospace;letter-spacing:.18em}.copy h1{margin:14px 0;font-family:"Iowan Old Style",Palatino,serif;font-size:clamp(60px,8.5vw,125px);font-weight:400;line-height:.82;letter-spacing:-.055em}.copy p{max-width:450px;color:#6c665c;line-height:1.8}.clay-button{padding:13px 22px;border:0;border-radius:18px 24px 16px 27px;background:#b96745;color:#f0e6d4;box-shadow:inset 5px 6px 10px #fff3,inset -7px -8px 12px #6d352827,0 11px 20px #5f4c3928;cursor:pointer}.clay-button:active{transform:translateY(5px);box-shadow:inset 6px 7px 12px #6d35282f}.shelf{position:relative;min-height:380px}.shelf:after{position:absolute;right:4%;bottom:35px;left:2%;height:15px;border-radius:50%;background:#493e3232;content:"";filter:blur(10px)}.pot{position:absolute;bottom:55px;box-shadow:inset -20px -10px 30px #4e2d2225,0 25px 25px #4d40332a}.pot:before{position:absolute;top:-10px;left:20%;width:60%;height:22px;border-radius:50%;background:#322f29;content:""}.p1{left:8%;width:38%;height:250px;border-radius:45% 50% 37% 43% / 26% 25% 10% 12%;background:linear-gradient(115deg,#8e432f,#c67650 50%,#8d422f)}.p2{right:6%;width:29%;height:185px;border-radius:49% 46% 35% 43% / 19% 22% 9% 10%;background:linear-gradient(120deg,#292722,#696257)}.p3{right:31%;width:18%;height:115px;border-radius:50% 47% 23% 20%;background:linear-gradient(115deg,#e8ddc8,#b7a894)}.mark{position:absolute;z-index:2;left:23%;bottom:142px;color:#eadac0;font-family:Georgia,serif;font-size:55px;opacity:.55}
.collection{display:grid;grid-template-columns:1.1fr .9fr 1fr;gap:18px}.panel{min-height:255px;padding:22px;border:0;border-radius:34px 24px 40px 20px;background:#eee5d4a8;box-shadow:0 22px 35px #5f4b3620,inset 0 1px #fff8}.panel:nth-child(2){transform:translateY(14px);border-radius:23px 42px 21px 36px}.panel h2{margin:0 0 20px;font-family:"Iowan Old Style",Georgia,serif;font-size:21px;font-weight:400}.field{margin:13px 0}.field label{display:block;margin-bottom:6px;color:#777064;font-size:10px}.field input,.field select{width:100%;padding:11px 5px;border:0;border-bottom:1px solid #71695d;background:transparent;outline:none}.field input:focus{border-color:#b96745}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 12px;border:0;border-radius:18px 23px 16px 26px;background:#d5c8b3;color:#625a4f;cursor:pointer}.chip.active{background:#292722;color:#e8decb}.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #29272222}.toggle button{position:relative;width:47px;height:23px;border:0;border-radius:50%;background:#b9ac98;cursor:pointer;box-shadow:inset 3px 4px 8px #6455462c}.toggle button:after{position:absolute;top:3px;left:4px;width:17px;height:17px;border-radius:45% 55% 48% 52%;background:#eae0cd;content:"";transition:.25s}.toggle button[aria-pressed=true]{background:#b96745}.toggle button[aria-pressed=true]:after{left:26px}.firing{display:flex;align-items:flex-end;justify-content:space-around;height:105px;padding-top:15px}.firing i{display:block;width:18%;border-radius:50% 50% 8px 8px;background:#b96745}.firing i:nth-child(2){background:#8d8071}.firing i:nth-child(3){background:#292722}.labels{display:flex;justify-content:space-around;color:#756d61;font:8px ui-monospace,monospace}.toast{position:fixed;right:25px;bottom:25px;padding:13px 18px;border-radius:21px 32px 18px 28px;background:#292722;color:#e9deca;opacity:0;transform:translateY(15px);transition:.3s}.toast.show{opacity:1;transform:none}
@media(max-width:800px){.app{display:block}.side{display:none}.content{padding:20px}.top nav{display:none}.hero{grid-template-columns:1fr}.collection{grid-template-columns:1fr}.panel:nth-child(2){transform:none}.copy h1{font-size:70px}}
</style></head><body><div class="app"><main class="content"><header class="top"><span>KILN / OBJECTS SHAPED BY TIME</span><nav><a href="#">Collection</a><a href="#">Journal</a><a href="#">Studio</a></nav></header><section class="hero"><div class="copy"><div class="kicker">OBJECTS / FIRE / TIME · BATCH 06</div><h1>Perfectly unfinished</h1><p>保留指印、釉裂和微微偏心的轮廓。控件像手捏陶器，不追求机器般精确，却在每次触碰中保留温度。</p><button class="clay-button toast-btn">查看本次窑藏　→</button></div><div class="shelf"><div class="pot p1"></div><div class="pot p2"></div><div class="pot p3"></div><span class="mark">火</span></div></section><section class="collection"><article class="panel"><h2>Clay composition</h2><div class="field"><label>器物名称</label><input value="Smoke Vessel No. 06"></div><div class="field"><label>土料</label><select><option>赤陶 · 细砂</option><option>黑陶 · 粗砾</option><option>白陶 · 长石</option></select></div><div class="chips"><button class="chip active">生釉</button><button class="chip">烟熏</button><button class="chip">无釉</button></div></article><article class="panel"><h2>Firing controls</h2><div class="toggle"><span>保留指痕</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>自然落灰</span><button data-toggle aria-pressed="true"></button></div><div class="toggle"><span>匣钵保护</span><button data-toggle aria-pressed="false"></button></div><div class="field"><label>窑温 · <output id="heat">1220</output>°C</label><input type="range" min="900" max="1350" value="1220" oninput="heat.value=this.value" style="accent-color:#b96745"></div></article><article class="panel"><h2>Firing profile</h2><div class="firing"><i style="height:38%"></i><i style="height:72%"></i><i style="height:96%"></i><i style="height:55%"></i></div><div class="labels"><span>DRY</span><span>RISE</span><span>SOAK</span><span>COOL</span></div><button class="clay-button toast-btn" style="width:100%;margin-top:22px">封窑烧制</button></article></section></main><aside class="side"><b>窑 · KILN</b><nav><a class="active" href="#">器物</a><a href="#">火候</a><a href="#">土料</a></nav><small>WABI-SABI / 06</small></aside></div><div class="toast">本次烧制已加入窑程</div><script>document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));b.classList.add("active")});document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{let t=document.querySelector(".toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)})</script></body></html>
