<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ARCADE — 8-bit 街机</title>
<style>
*{box-sizing:border-box;image-rendering:pixelated}html,body{margin:0;min-height:100%;background:#070914;color:#f2f6e9}body{font-family:"Courier New",monospace;background:radial-gradient(ellipse at center,#141d39,#070914 70%)}body:after{position:fixed;z-index:20;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,#fff08 0 1px,transparent 1px 4px),radial-gradient(ellipse at center,transparent 45%,#000b);content:"";mix-blend-mode:screen}.cabinet{max-width:1400px;min-height:100vh;margin:auto;border-right:12px solid #ff3d59;border-left:12px solid #19d8ff;box-shadow:0 0 30px #19d8ff44}.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 25px;border-bottom:5px solid #19d8ff;background:#090c19;text-transform:uppercase}.score{color:#ffd338;font-weight:bold}.score span{display:block;color:#f2f6e9;font-size:10px}.logo{color:#ffd338;font-size:22px;font-weight:900;text-align:center;text-shadow:4px 0 #ff3d59,-4px 0 #19d8ff}.lives{justify-self:end;color:#ff3d59;font-size:20px}.game{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;padding:24px}.maze{position:relative;min-height:440px;border:6px solid #2146ff;background:linear-gradient(90deg,#173085 8px,transparent 8px) 0 0/54px 54px,linear-gradient(#173085 8px,transparent 8px) 0 0/54px 54px,radial-gradient(circle,#ffd338 0 2px,transparent 3px) 11px 11px/27px 27px,#080a16;box-shadow:7px 7px #ff3d59,-7px -7px #19d8ff}.maze h1{position:absolute;z-index:3;top:38px;right:20px;left:20px;margin:0;color:#ffd338;font-size:clamp(48px,8vw,104px);line-height:.86;text-align:center;text-shadow:6px 0 #ff3d59,-6px 0 #19d8ff}.ghost{position:absolute;left:50%;bottom:55px;width:125px;height:110px;border:7px solid #f2f6e9;border-radius:60px 60px 0 0;background:radial-gradient(circle at 35% 44%,#080a16 0 7px,transparent 8px),radial-gradient(circle at 65% 44%,#080a16 0 7px,transparent 8px),#ff3d59;box-shadow:10px 10px #19d8ff;transform:translateX(-50%);animation:step 1.1s steps(2) infinite}.ghost:after{position:absolute;right:0;bottom:-8px;left:0;height:24px;background:linear-gradient(135deg,transparent 25%,#f2f6e9 26% 50%,transparent 51%) 0/25% 100%;content:""}@keyframes step{50%{transform:translateX(-42%)}}.ready{position:absolute;right:20px;bottom:20px;left:20px;color:#f2f6e9;text-align:center;animation:blink .8s steps(1) infinite}@keyframes blink{50%{opacity:0}}.hud{display:flex;flex-direction:column;gap:14px}.panel{padding:16px;border:4px solid #19d8ff;background:#0b1021;box-shadow:5px 5px #ff3d59}.panel h2{margin:0 0 13px;color:#ffd338;font-size:13px;text-transform:uppercase}.select-row{display:flex;gap:6px}.select-row button{flex:1;padding:10px 4px;border:3px solid #6879a7;background:#0b1021;color:#9eadcc;font:bold 10px "Courier New";cursor:pointer}.select-row button.active{border-color:#ffd338;color:#ffd338}.inventory{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.item{display:grid;place-items:center;aspect-ratio:1;border:3px solid #344779;background:#111a36;font-size:23px;cursor:pointer}.item.active{border-color:#ffd338;background:#29345a}.stat{display:grid;grid-template-columns:70px 1fr auto;gap:8px;align-items:center;margin:12px 0;font-size:10px}.bar{height:14px;border:3px solid #f2f6e9;padding:2px}.bar i{display:block;height:100%;background:repeating-linear-gradient(90deg,#19d8ff 0 8px,transparent 8px 11px)}.stat:nth-child(3) .bar i{background:repeating-linear-gradient(90deg,#ff3d59 0 8px,transparent 8px 11px)}.switch{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2px dashed #344779}.switch button{width:46px;height:22px;border:3px solid #f2f6e9;background:#0b1021;cursor:pointer}.switch button:after{display:block;width:12px;height:12px;background:#6879a7;content:"";transform:translate(2px,2px)}.switch button[aria-pressed=true]:after{background:#ffd338;transform:translate(26px,2px)}.start{width:100%;padding:13px;border:4px solid #ffd338;background:#ff3d59;color:white;font-weight:900;box-shadow:5px 5px #19d8ff;cursor:pointer}.start:active{transform:translate(4px,4px);box-shadow:1px 1px #19d8ff}.coin{position:fixed;right:25px;bottom:25px;padding:12px 18px;border:4px solid #ffd338;background:#090c19;color:#ffd338;opacity:0;transition:.2s}.coin.show{opacity:1}
@media(max-width:800px){.game{grid-template-columns:1fr;padding:14px}.maze{min-height:400px}.scorebar{padding:13px 10px}.score,.lives{font-size:10px}.logo{font-size:16px}.maze h1{font-size:54px}}
</style></head><body><main class="cabinet"><header class="scorebar"><div class="score"><span>1UP SCORE</span>028640</div><div class="logo">KIT ARCADE</div><div class="lives">● ● ●</div></header><section class="game"><div class="maze"><h1>INSERT WONDER</h1><div class="ghost"></div><div class="ready">▶ PRESS START ◀</div></div><aside class="hud"><article class="panel"><h2>01 / Choose player</h2><div class="select-row"><button class="active">P1 CYAN</button><button>P2 PINK</button><button>CPU</button></div></article><article class="panel"><h2>02 / Power inventory</h2><div class="inventory"><button class="item active">●</button><button class="item">◆</button><button class="item">★</button><button class="item">♜</button></div><div class="stat"><span>ENERGY</span><div class="bar"><i style="width:84%"></i></div><b>84</b></div><div class="stat"><span>COMBO</span><div class="bar"><i style="width:63%"></i></div><b>x8</b></div></article><article class="panel"><h2>03 / Cabinet setup</h2><div class="switch"><span>CRT GLOW</span><button data-toggle aria-pressed="true"></button></div><div class="switch"><span>SCANLINES</span><button data-toggle aria-pressed="true"></button></div><div class="switch"><span>COIN SOUND</span><button data-toggle aria-pressed="false"></button></div><input type="range" value="78" style="width:100%;margin:14px 0;accent-color:#ffd338"><button class="start toast-btn">▶ PRESS START</button></article></aside></section></main><div class="coin">+1 CREDIT / READY!</div><script>document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".select-row button,.item").forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active")});document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{let t=document.querySelector(".coin");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1500)})</script></body></html>
