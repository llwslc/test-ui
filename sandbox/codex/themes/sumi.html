</style></head><body><div class="app"><aside class="rail"><div class="seal">墨</div><nav><a class="active" href="#">静观</a><a href="#">器物</a><a href="#">日课</a><a href="#">藏书</a></nav><small>SUMI / 01</small></aside><main class="page"><header class="top"><span class="brand">KIT / SUMI PRACTICE</span><div class="weather"><span>薄曇 18°</span><span>甲辰 · 七月</span></div></header><section class="hero"><div class="hero-copy"><h1>余白</h1><div class="intro"><p class="kicker">間 · THE BEAUTY BETWEEN</p><h2>一笔，一息，一方天地</h2><p>界面不必填满。让内容像墨落宣纸，有浓淡、有停顿，也有未说完的余韵。</p><button class="brush-button toast-btn">开始今日练习　→</button></div></div><div class="ink-stage"><div class="enso"></div><div class="poem">山静似太古<br>日长如小年</div><div class="red-dot">壹</div></div></section><section class="components"><article class="panel"><h3>01 / 书写参数</h3><div class="field"><label>题签</label><input type="text" value="松风入怀" aria-label="题签"></div><div class="field"><label>纸张</label><select aria-label="纸张"><option>熟宣 · 暖白</option><option>生宣 · 本白</option><option>麻纸 · 灰黄</option></select></div><div class="checks"><label class="check"><input type="radio" name="ink" checked>焦墨</label><label class="check"><input type="radio" name="ink">淡墨</label><label class="check"><input type="radio" name="ink">朱砂</label></div></article><article class="panel"><h3>02 / 墨色状态</h3><div class="stat-row"><span>含水</span><div class="bar"><i style="width:64%"></i></div><b>64</b></div><div class="stat-row"><span>锋颖</span><div class="bar"><i style="width:82%"></i></div><b>82</b></div><div class="stat-row"><span>飞白</span><div class="bar"><i style="width:38%"></i></div><b>38</b></div><div class="field"><label>笔势 <output id="rangeOut">47</output></label><input class="range" type="range" value="47" oninput="rangeOut.value=this.value"></div></article><article class="panel"><h3>03 / 练习设置</h3><div class="switch"><span>呼吸引导</span><button aria-pressed="true" data-toggle></button></div><div class="switch"><span>纸纹反馈</span><button aria-pressed="false" data-toggle></button></div><div class="switch"><span>落款提醒</span><button aria-pressed="true" data-toggle></button></div><div class="actions"><button>存为草稿</button><button class="primary toast-btn">完成落款</button></div></article></section></main></div><div class="toast">墨迹已收入今日册页</div><script>document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true"));document.querySelectorAll(".toast-btn").forEach(b=>b.onclick=()=>{const t=document.querySelector(".toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)})</script></body></html>
