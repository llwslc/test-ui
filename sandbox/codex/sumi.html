<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SUMI / 书画藏品台</title><style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap');:root{--paper:#eee9dc;--ink:#171613;--seal:#a23c2f}*{box-sizing:border-box}body{margin:0;background:#bcb3a2;color:var(--ink);font-family:"Noto Serif SC"}.scroll{width:min(1360px,96vw);margin:auto;background:var(--paper);min-height:100vh;box-shadow:0 0 50px #3e392f;background-image:radial-gradient(#00000013 1px,transparent 1px);background-size:9px 9px}.nav{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;border-bottom:1px solid #0003;font-size:11px;letter-spacing:4px}.nav a{color:inherit}.hero{min-height:650px;position:relative;padding:70px 8vw;overflow:hidden}.hero h1{writing-mode:vertical-rl;font:clamp(65px,9vw,125px) "Ma Shan Zheng";position:absolute;right:8%;top:10%;margin:0}.hero h1 small{font:14px "Noto Serif SC";letter-spacing:8px;margin-right:20px}.enso{position:absolute;width:min(55vw,650px);aspect-ratio:1;border:45px solid var(--ink);border-right-color:transparent;border-radius:50%;left:7%;top:3%;filter:url(#none);transform:rotate(-22deg)}.poem{position:absolute;left:15%;bottom:9%;width:300px;line-height:2}.seal{display:grid;place-items:center;width:65px;aspect-ratio:1;border:4px double var(--seal);color:var(--seal);margin-top:18px}.archive{padding:90px 7vw;background:#f3eee2;border-top:1px solid}.archive>h2{font:clamp(50px,7vw,85px) "Ma Shan Zheng";margin:0 0 40px}.desk{display:grid;grid-template-columns:220px 1fr 280px;gap:30px}.folders{border-right:1px solid;padding-right:20px}.folders button{display:block;width:100%;border:0;border-bottom:1px solid #0003;background:transparent;padding:13px;text-align:left}.folders button.active{color:var(--seal);border-left:4px solid var(--seal)}.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.work{border:1px solid;padding:13px;background:var(--paper);cursor:pointer}.painting{height:220px;background:linear-gradient(150deg,transparent 45%,#111 46% 48%,transparent 49%),radial-gradient(ellipse at 60% 60%,#222 0 10%,transparent 11%);position:relative}.painting:after{content:"山";font:90px "Ma Shan Zheng";position:absolute;right:20px;bottom:10px;opacity:.8}.work.active{box-shadow:9px 9px #0003}.work b,.work small{display:block;margin-top:7px}.inspector h3{font:30px "Ma Shan Zheng"}.field{display:block;font-size:11px;letter-spacing:2px;margin:14px 0}.field input,.field select,.field textarea{display:block;width:100%;border:0;border-bottom:1px solid;background:transparent;padding:9px}.field textarea{height:75px;border:1px solid}.field input[type=range]{accent-color:var(--seal)}.checks label{display:block;margin:12px 0}.ink-btn{border:0;border-bottom:1px solid;background:transparent;padding:10px 12px}.ink-btn.primary{background:var(--ink);color:var(--paper)}.registry{margin-top:50px;display:grid;grid-template-columns:1fr 1fr;gap:35px}.registry table{width:100%;border-collapse:collapse}.registry th,.registry td{text-align:left;border-bottom:1px solid #0003;padding:11px}.note{border-left:5px solid var(--seal);padding:18px;background:#a23c2f0a}.drop{position:fixed;border-radius:50%;background:#111;animation:bloom 2s forwards;pointer-events:none}@keyframes bloom{to{transform:scale(4);opacity:0;filter:blur(8px)}}@media(max-width:850px){.desk,.registry{grid-template-columns:1fr}.gallery{grid-template-columns:1fr}.folders{border-right:0}.enso{width:600px;left:-30%}}
</style></head><body><main class="scroll"><header class="nav"><b>素墨 / 藏画台</b><span>己未卷 · 丙字号</span><a href="index.html">返回图鉴 ↗</a></header><section class="hero"><div class="enso"></div><h1>一滴成山水<small>留白不是空无</small></h1><div class="poem">这不是控件陈列，而是一张书画入藏工作台：选卷、审纸、题跋、落印，最后收入书匣。<span class="seal">素<br>美</span></div></section><section class="archive"><h2>书画入藏工作台</h2><div class="desk"><aside class="folders"><h3>书匣</h3><button class="active">丙 / 待审画卷　04</button><button>丁 / 已装裱　12</button><button>戊 / 题跋中　07</button><button>己 / 外借　02</button><button>全部藏品　48</button></aside><div class="gallery"><article class="work active" data-title="远山无声"><div class="painting"></div><b>远山无声</b><small>熟宣 · 水墨 · 丙一二</small></article><article class="work" data-title="松风入砚"><div class="painting" style="filter:contrast(.7);transform:rotate(.5deg)"></div><b>松风入砚</b><small>生宣 · 设色 · 丁〇七</small></article><article class="work" data-title="寒江独钓"><div class="painting" style="filter:blur(.3px)"></div><b>寒江独钓</b><small>绢本 · 水墨 · 戊一九</small></article><article class="work" data-title="雨后空林"><div class="painting" style="opacity:.7"></div><b>雨后空林</b><small>熟宣 · 淡墨 · 丙二四</small></article></div><aside class="inspector"><span>卷轴详情 / INSPECT</span><h3 id="workTitle">远山无声</h3><label class="field">藏品编号<input value="丙一二"></label><label class="field">纸本<select><option>熟宣 · 暖白</option><option>生宣 · 素白</option></select></label><label class="field">墨色稳定度 / 82<input type="range" value="82"></label><div class="checks"><label><input type="checkbox" checked> 墨色已干</label><label><input type="checkbox"> 题跋完成</label><label><input type="checkbox"> 已钤藏印</label></div><label class="field">鉴藏题记<textarea>远岫含烟，笔意清寂。</textarea></label><button class="ink-btn" id="drop">试 墨</button><button class="ink-btn primary" id="archive">收入书匣</button></aside></div><div class="registry"><table><thead><tr><th>字号</th><th>作品</th><th>状态</th></tr></thead><tbody><tr><td>丙一二</td><td>远山无声</td><td id="state">待审</td></tr><tr><td>丁〇七</td><td>松风入砚</td><td>已装裱</td></tr></tbody></table><div class="note"><b>今日库房</b><p>温度 21°C · 湿度 62% · 光照 48 lx</p><p>丙字号书匣尚余四格。</p></div></div></section></main><script>document.querySelectorAll(".work").forEach(w=>w.onclick=()=>{document.querySelectorAll(".work").forEach(x=>x.classList.remove("active"));w.classList.add("active");document.querySelector("#workTitle").textContent=w.dataset.title});document.querySelector("#archive").onclick=()=>{document.querySelector("#state").textContent="已入藏";document.querySelector("#archive").textContent="已 收 入"};document.querySelector("#drop").onclick=e=>{const d=document.createElement("i");d.className="drop";d.style.cssText=`width:40px;height:40px;left:${e.clientX}px;top:${e.clientY}px`;document.body.append(d);setTimeout(()=>d.remove(),2100)};</script></body></html>
